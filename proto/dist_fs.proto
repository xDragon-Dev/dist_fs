syntax = "proto3";
package dist_fs;

//Client message that specifies data about a file namechange
message FileData {
  string filename = 1;
  string file_path = 2;
  bytes content = 3;
}

//Response after transferin a file to a server
message FileUploadResponse {
    string response = 1;
}

//Service related to all file operations (Transfer, Create, Delete, Rename, Update)
service FileSystem {
    //Transfer a file to a server
    rpc TransferFile(FileData) returns (FileUploadResponse);
}